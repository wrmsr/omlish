no_daemon = true
http_port = 5051

[[groups]]
name = 'default'

[[processes]]
name = 'ls'
group = 'default'
command = 'ls -al'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true

[[processes]]
name = 'sleep'
group = 'default'
command = 'sleep 600'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true

[[processes]]
name = 'sleepx'
group = 'default'
command = 'sleep 789'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true
