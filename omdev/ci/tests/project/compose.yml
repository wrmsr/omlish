services:
  om-ci:
    build: '.'
    image: 'wrmsr/om-ci:latest'
    platform: 'linux/x86_64'
    restart: 'no'
    depends_on:
      - 'om-postgres'
      - 'om-s3'

  om-postgres:
    image: 'postgres:17.9'
    restart: 'unless-stopped'
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'om'
    expose:
      - '5432'
    ports:
      - '35224:5432'

  om-s3:
    image: 'adobe/s3mock:3.12.0'
    restart: 'unless-stopped'
    expose:
      - '9090'
      - '9191'
    ports:
      - '35226:9090'
      - '35227:9191'
