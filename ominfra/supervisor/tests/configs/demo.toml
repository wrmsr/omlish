no_daemon = true

[[groups]]
name = 'default'

[[groups.processes]]
name = 'ls'
command = 'ls -al'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true

[[groups.processes]]
name = 'sleep'
command = 'sleep 600'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true

[[groups.processes]]
name = 'sleepx'
command = 'sleep 789'
stdout = {file = '/dev/fd/1', max_bytes = 0}
redirect_stderr = true
